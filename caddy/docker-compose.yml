services:
  caddy:
    image: caddy:2-alpine
    container_name: shared_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    networks:
      - shared

networks:
  shared:
    external: true
