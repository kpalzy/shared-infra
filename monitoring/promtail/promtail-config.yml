server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://shared_loki:3100/loki/api/v1/push

scrape_configs:
  # Docker 컨테이너 로그 자동 수집
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock  # 컨테이너 내부 경로 (호스트 /run/docker.sock → 마운트)
        refresh_interval: 10s
    relabel_configs:
      # 컨테이너 이름을 label로
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # compose 서비스명
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # compose 프로젝트명
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
    pipeline_stages:
      # ERROR / CRITICAL 라인에 level label 부여
      - regex:
          expression: "(?i)(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL)"
      - labels:
          level:
