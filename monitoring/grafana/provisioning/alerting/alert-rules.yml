apiVersion: 1

groups:
  - orgId: 1
    name: kepture-alerts
    folder: Kepture
    interval: 1m
    rules:
      # 1. 컨테이너 에러 로그 감지
      - uid: error-log-spike
        title: "ERROR 로그 급증"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300    # 최근 5분
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({project=~"kepture.*"} |~ "(?i)ERROR|CRITICAL" [5m])) or vector(0)'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]     # 5분간 ERROR 10건 이상
        for: 0s
        annotations:
          summary: "최근 5분간 ERROR/CRITICAL 로그 {{ $values.A }} 건 감지"
        labels:
          severity: warning

      # 2. 컨테이너 로그 수집 중단 (컨테이너 다운 감지)
      - uid: backend-silent
        title: "Backend 로그 수집 중단"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600    # 최근 10분
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({container="kepture-backend-1"} [10m])) or vector(0)'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]      # 10분간 로그 0건 = 죽었을 가능성
        for: 2m
        annotations:
          summary: "kepture-backend-1 로그가 10분 이상 수집되지 않음 — 컨테이너 확인 필요"
        labels:
          severity: critical

      # 3. DB 커넥션 과다
      - uid: pg-connections
        title: "PostgreSQL 커넥션 과다"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: postgres
            model:
              rawSql: "SELECT count(*) as value FROM pg_stat_activity WHERE datname = 'kepture';"
              format: table
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [80]     # 80개 이상이면 경고
        for: 5m
        annotations:
          summary: "kepture DB 커넥션 {{ $values.A }}개 — 누수 가능성"
        labels:
          severity: warning
