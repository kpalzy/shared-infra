apiVersion: 1

datasources:
  # 컨테이너 로그 (Loki)
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://shared_loki:3100
    isDefault: true
    editable: false

  # PostgreSQL 직접 쿼리 (DB 모니터링)
  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: shared_postgres:5432
    database: kepture
    user: shared_pg_su
    secureJsonData:
      password: "${GF_PG_PASSWORD}"
    jsonData:
      sslmode: disable
      maxOpenConns: 2
      maxIdleConns: 1
    editable: false
